name: Re d_1_d folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside d_1_d/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove d_1_d folder and recreate it
        run: |
          rm -rf d_1_d
          mkdir d_1_d

      - name: Commit and push empty folder
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add d_1_d
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[LiveDL] Empty d_1_d folder [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ d_1_d folder cleared"
          fi
