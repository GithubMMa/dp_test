name: 📦 Data Sync la
on:
  workflow_dispatch:
    inputs:
      data_links:
        description: 'Data url (space separated)'
        required: true
        type: string
      encryption_password:
        description: 'password'
        required: true
        type: string
      release_tag:
        description: 'tg v (optional, leave empty for auto)'
        required: false
        type: string
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip parallel curl jq

      - name: Prepare Random Name and Directories
        id: setup
        run: |
          RANDOM_NAME=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 9)
          echo "RANDOM_NAME=$RANDOM_NAME" >> $GITHUB_ENV
          
          mkdir -p downloads
          mkdir -p output
          echo "Random Name: $RANDOM_NAME"

      - name: Download Files in Parallel
        run: |
          IFS=' ' read -ra LINKS <<< "${{ github.event.inputs.data_links }}"
          
          echo "Starting downloads for links: ${LINKS[@]}"
          
          for link in "${LINKS[@]}"; do
            link=$(echo $link | xargs)
            # Skip empty links
            [ -z "$link" ] && continue
            
            filename=$(basename "$link")
            echo "Downloading $filename..."
            curl -L -o "downloads/$filename" "$link" &
          done
          
          wait
          echo "Downloads completed."
          ls -lh downloads/

      - name: Split and Encrypt Files
        run: |
          PASSWORD="${{ github.event.inputs.encryption_password }}"
          PREFIX="${RANDOM_NAME}"
          
          mkdir -p output
          
          FILE_COUNT=0
          for file in downloads/*; do
            if [ -f "$file" ]; then
              echo "Processing: $file"
              base_name=$(basename "$file")
              
              # Create a unique zip for each file to avoid overwriting
              # Using -s 1024m for split, but note: -s creates multiple files with suffixes
              # If you want a single zip per file, remove -s or handle suffixes
              zip -e -P "$PASSWORD" -j -s 1024m -0 "output/${PREFIX}.zip" "$file"
              
              FILE_COUNT=$((FILE_COUNT + 1))
            fi
          done
          
          echo "Created split encrypted zip files in output/"
          ls -lh output/
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files were processed!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # If release_tag input is empty, generate a random tag
          tag_name: ${{ github.event.inputs.release_tag || format('v-{0}-{1}', github.run_number, RANDOM_NAME) }}
          name: "Release ${{ github.run_number }}"
          body: "Release of beta version of dp_test files for testing ai base live upload to GitHub by the project"
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
