name: 📦 Data Sync la
on:
  workflow_dispatch:
    inputs:
      data_links:
        description: 'Data url'
        required: true
        type: string
      encryption_password:
        description: 'password'
        required: true
        type: string
      release_tag:
        description: 'tg v'
        required: true
        type: string
        default: 'v1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get install -y zip unzip parallel curl jq

      - name: Prepare Random Name and Directories
        id: setup
        run: |
          RANDOM_NAME=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 9)
          echo "RANDOM_NAME=$RANDOM_NAME" >> $GITHUB_ENV
          
          mkdir -p downloads
          mkdir -p output

      - name: Download Files in Parallel
        run: |
          IFS=' ' read -ra LINKS <<< "${{ github.event.inputs.data_links }}"
          
          echo "Starting downloads for links: ${LINKS[@]}"
          
          for link in "${LINKS[@]}"; do
            link=$(echo $link | xargs)
            filename=$(basename "$link")
            echo "Downloading $filename..."
            curl -L -o "downloads/$filename" "$link" &
          done
          
          wait
          echo "Downloads completed."

      - name: Split and Encrypt Files
        run: |
          PASSWORD="${{ github.event.inputs.encryption_password }}"
          PREFIX="${RANDOM_NAME}"
          
          mkdir -p output
          
          for file in downloads/*; do
            if [ -f "$file" ]; then
              echo "Processing: $file"
              base_name=$(basename "$file")
              name_without_ext="${base_name%.*}"
              
              zip -e -P "$PASSWORD" -j -s 1024m -0 "output/${PREFIX}.zip" "$file"
              
              echo "Created split encrypted zip files in output/"
            fi
          done
          
          echo "Listing output files:"
          ls -lh output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Version of dp_test Neural Network files Release"
          body: "Release of beta version of dp_test files for testing ai base live upload to GitHub by the project"
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
