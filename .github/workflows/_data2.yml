name: 📦 Data Sync2
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Data sources'
        required: true
        type: string
      mode:
        description: 'Processing mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Encryption key (optional)'
        required: false
        default: ''
        type: string
jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Init
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Setup Env
        run: |
          sudo apt-get install -y aria2 zip curl bc
      - name: Process Data
        run: |
          set -e
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          echo "Mode: $MODE"
          echo "Threshold: $SPLIT_THRESHOLD_MB MB"
          echo "Branch: $BRANCH"
          
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Encryption: ON"
          else
            echo "Encryption: OFF"
          fi
          
          mkdir -p _data _tmp
          
          # Function to generate random alphanumeric string
          get_random_id() {
            local len=8
            local chars="abcdefghijklmnopqrstuvwxyz0123456789"
            local result=""
            for (( i=0; i<len; i++ )); do
              result="${result}${chars:$((RANDOM % ${#chars})):1}"
            done
            echo "$result"
          }

          # Function to get unique folder name (random)
          get_unique_folder() {
            local BASE_PATH="$1"
            local PREFIX="$2"
            local RAND_ID=$(get_random_id)
            local FOLDER_NAME="${PREFIX}_${RAND_ID}"
            
            # Check if exists, if so add another random suffix
            if [ -d "$BASE_PATH/$FOLDER_NAME" ]; then
              RAND_ID=$(get_random_id)
              FOLDER_NAME="${PREFIX}_${RAND_ID}"
            fi
            echo "$FOLDER_NAME"
          }

          create_error_file() {
            local ORIG_FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local RAND_FOLDER=$(get_unique_folder "_data" "err")
            mkdir -p "_data/$RAND_FOLDER"
            {
              echo "# Error Log"
              echo ""
              echo "| Key | Value |"
              echo "|-----|-------|"
              echo "| **Target** | \`${ORIG_FILENAME}\` |"
              echo "| **Source** | ${URL} |"
              echo "| **Time** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Result** | **FAILED** |"
              echo "---"
              echo "## Error"
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
            } > "_data/$RAND_FOLDER/log.txt"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""
            
            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt for $FILENAME"
              
              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=90 \
                --connect-timeout=36 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="_tmp" \
                --out="$FILENAME" \
                "$URL" 2>&1) && SUCCESS=true && break
              
              echo "Fallback to curl..."
              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "_tmp/$FILENAME" \
                "$URL" 2>&1) && SUCCESS=true && break
              
              echo "Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            done
            
            if [ "$SUCCESS" = true ] && [ -f "_tmp/$FILENAME" ]; then
              if [ -s "_tmp/$FILENAME" ]; then
                echo "OK: $FILENAME"
                return 0
              else
                rm -f "_tmp/$FILENAME"
                create_error_file "$FILENAME" "Empty file" "$URL"
                return 1
              fi
            else
              create_error_file "$FILENAME" "$ERROR_LOG" "$URL"
              return 1
            fi
          }

          # Process URLs
          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            echo "Fetching: $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || echo "Failed: $FILENAME"
          done

          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A _tmp 2>/dev/null)" ]; then
              RAND_ARCHIVE=$(get_random_id)
              RAND_FOLDER=$(get_unique_folder "_data" "pkg")
              mkdir -p "_data/$RAND_FOLDER"
              
              echo "Zipping into: $RAND_FOLDER/$RAND_ARCHIVE.zip"
              
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" "_data/$RAND_FOLDER/${RAND_ARCHIVE}.zip" _tmp/*
              else
                zip -j "_data/$RAND_FOLDER/${RAND_ARCHIVE}.zip" _tmp/*
              fi
              
              ZIP_SIZE=$(stat -c%s "_data/$RAND_FOLDER/${RAND_ARCHIVE}.zip")
              ZIP_SIZE_MB=$(echo "scale=2; $ZIP_SIZE / 1024 / 1024" | bc)
              FOLDER_ENCODED=$(echo "${RAND_FOLDER}" | sed 's/ /%20/g')
              FILE_ENCODED=$(echo "${RAND_ARCHIVE}.zip" | sed 's/ /%20/g')
              RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/_data/${FOLDER_ENCODED}/${FILE_ENCODED}"
              
              {
                echo "# Archive Info"
                echo ""
                echo "| Key | Value |"
                echo "|-----|-------|"
                echo "| **ID** | \`${RAND_ARCHIVE}\` |"
                echo "| **Size** | ${ZIP_SIZE_MB} MB |"
                echo "| **Status** | **Done** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Locked** | **YES** |"
                else
                  echo "| **Locked** | **NO** |"
                fi
                echo ""
                echo "| File | Link |"
                echo "|------|------|"
                echo "| \`${RAND_ARCHIVE}.zip\` | [Get](${RAW_LINK}) |"
              } > "_data/$RAND_FOLDER/info.txt"
            fi
            rm -rf _tmp
          else
            for FILE in _tmp/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              RAND_FOLDER=$(get_unique_folder "_data" "item")
              mkdir -p "_data/$RAND_FOLDER"
              
              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "Splitting large file: $BASENAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" -P "$ZIP_PASSWORD" "_data/$RAND_FOLDER/${RAND_FOLDER}.zip" -j "$FILE"
                else
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" "_data/$RAND_FOLDER/${RAND_FOLDER}.zip" -j "$FILE"
                fi
                
                PARTS_COUNT=$(ls _data/${RAND_FOLDER}/${RAND_FOLDER}.z* 2>/dev/null | wc -l)
                FOLDER_ENCODED=$(echo "${RAND_FOLDER}" | sed 's/ /%20/g')
                
                DOWNLOAD_LINKS=""
                for part_file in "_data/${RAND_FOLDER}/${RAND_FOLDER}".z* "_data/${RAND_FOLDER}/${RAND_FOLDER}.zip"; do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/_data/${FOLDER_ENCODED}/${PART_ENCODED}"
                    DOWNLOAD_LINKS="${DOWNLOAD_LINKS}| \`${PART_BASENAME}\` | [Get](${RAW_LINK}) |"$'\n'
                  fi
                done

                {
                  echo "# Split Archive"
                  echo ""
                  echo "| Key | Value |"
                  echo "|-----|-------|"
                  echo "| **Original** | \`${RAND_FOLDER}\` |"
                  echo "| **Size** | $(( SIZE / 1024 / 1024 )) MB |"
                  echo "| **Parts** | ${PARTS_COUNT} |"
                  echo "| **Status** | **Done** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    echo "| **Locked** | **YES** |"
                  else
                    echo "| **Locked** | **NO** |"
                  fi
                  echo ""
                  echo "| File | Link |"
                  echo "|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS}"
                } > "_data/$RAND_FOLDER/info.txt"
              else
                echo "Zipping: $RAND_FOLDER"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" "_data/$RAND_FOLDER/${RAND_FOLDER}.zip" "$FILE"
                else
                  zip -j "_data/$RAND_FOLDER/${RAND_FOLDER}.zip" "$FILE"
                fi
                
                FILE_ENCODED=$(echo "${RAND_FOLDER}.zip" | sed 's/ /%20/g')
                FOLDER_ENCODED=$(echo "${RAND_FOLDER}" | sed 's/ /%20/g')
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/_data/${FOLDER_ENCODED}/${FILE_ENCODED}"
                
                {
                  echo "# Archive Info"
                  echo ""
                  echo "| Key | Value |"
                  echo "|-----|-------|"
                  echo "| **Original** | \`${RAND_FOLDER}\` |"
                  echo "| **Size** | $(( SIZE / 1024 / 1024 )) MB |"
                  echo "| **Status** | **Done** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    echo "| **Locked** | **YES** |"
                  else
                    echo "| **Locked** | **NO** |"
                  fi
                  echo ""
                  echo "---"
                  echo ""
                  echo "| File | Link |"
                  echo "|------|------|"
                  echo "| \`${RAND_FOLDER}.zip\` | [Get](${RAW_LINK}) |"
                  echo ""
                } > "_data/$RAND_FOLDER/info.txt"
              fi
            done
            rm -rf _tmp
          fi
      - name: Update Index
        run: |
          FOLDERS=$(find _data -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)
          
          if [ -z "$FOLDERS" ]; then
            echo "No data found"
            exit 0
          fi
          
      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "bot"
          git config user.email "bot@github.com"
          
          git add README.md
          git add _data/
          
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "[Sync] Update data [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
          
          echo "Pushed"
