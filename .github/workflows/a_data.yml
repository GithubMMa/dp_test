name: Process DT

on:
  workflow_dispatch:
    inputs:
      A_KEY:
        description: 'A Key for Service'
        required: true
        type: string
      A_URL:
        description: 'A Endpoint URL'
        required: true
        type: string
      DT_PASS:
        description: 'Password'
        required: true
        type: string
      A_M:
        description: 'A_M'
        required: true
        type: string

jobs:
  process-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python Environment
        run: |
          sudo apt-get install -y unzip python3-pip
          pip3 install requests python-dotenv

      - name: Extract dt.zip
        run: |
          sudo apt-get install -y p7zip-full
          7z x assets/dt/dt.zip -p${{ inputs.DT_PASS }} -oassets/dt/ -y
          
          if [ ! -f assets/dt/dt.db ]; then
            echo "Error: dt.db not found after extraction."
            exit 1
          fi

      - name: Process Questions
        run: |
          python3 << 'EOF'
          import sqlite3
          import requests
          import json
          import os

          api_key = os.environ['INPUT_A_KEY']
          ai_url = os.environ['INPUT_A_URL']
          ai_model = os.environ['INPUT_A_M']
          db_path = 'assets/dt/dt.db'

          conn = sqlite3.connect(db_path)
          cursor = conn.cursor()

          cursor.execute("SELECT rowid, question FROM dt")
          rows = cursor.fetchall()

          print(f"Found {len(rows)} records to process.")

          for row in rows:
              row_id = row[0]
              question = row[1]

              if not question or question.strip() == "":
                  continue

              print(f"Processing row {row_id}...")

              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }

              payload = {
                  "model": ai_model,
                  "messages": [
                      {"role": "system", "content": "You are a helpful assistant."},
                      {"role": "user", "content": question}
                  ],
                  "temperature": 0,
                  "top_k": 1,
                  "repeat_penalty": 1.01,
                  "top_p": 0.01,
                  "min_p": 0.0
              }

              try:
                  response = requests.post(ai_url, headers=headers, json=payload)
                  response.raise_for_status()
                  
                  result = response.json()
                  
                  if "choices" in result and len(result["choices"]) > 0:
                      answer = result["choices"][0]["message"]["content"]
                  else:
                      answer = "Error: No valid response from AI."
                      print(f"Warning: Unexpected response format for row {row_id}")

                  cursor.execute("UPDATE dt SET answer = ? WHERE rowid = ?", (answer, row_id))
                  conn.commit()
                  print(f"Row {row_id} updated successfully.")

              except Exception as e:
                  print(f"Error processing row {row_id}: {str(e)}")

          
          conn.close()
          print("Database processing completed.")
          EOF

      - name: Repackage and Push Changes
        run: |
          rm -f assets/dt/dt.zip

          7z a -p${{ inputs.DT_PASS }} -mhe=on assets/dt/dt.zip assets/dt/dt.db

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add assets/dt/dt.zip
          git commit -m "Update dt.db [skip ci]" || echo "No changes to commit"
          
          git push origin HEAD:${{ github.ref_name }}

      - name: Final Success Message
        if: always()
        run: |
          echo "The process was successful."
