name: 📦 Web Crawl Sync
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit'
        required: true
        type: string

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get install -y curl zip sed grep

      - name: Setup Node and Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Create screenshot script
        run: |
          cat > screenshot.js << 'ENDOFSCRIPT'
          const puppeteer = require('puppeteer');
          const url = process.argv[2];
          const outputPath = process.argv[3];
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            
            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
              await page.screenshot({ path: outputPath, fullPage: true });
              console.log('Screenshot saved successfully');
            } catch (err) {
              console.error('Screenshot error:', err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          ENDOFSCRIPT

      - name: Visit URL and download media
        id: crawl_step
        run: |
          set -e # Exit immediately if a command exits with a non-zero status
          
          RAW_URL="${{ github.event.inputs.url }}"
          
          # Normalize URL: try HTTPS first if no protocol given
          if [[ ! "$RAW_URL" =~ ^https?:// ]]; then
            HTTPS_URL="https://$RAW_URL"
            HTTP_URL="http://$RAW_URL"
            
            echo "Trying HTTPS: $HTTPS_URL"
            if curl -L --connect-timeout 10 --max-time 30 -o /dev/null -s -w "%{http_code}" "$HTTPS_URL" | grep -q "200\|301\|302\|303\|307\|308"; then
              URL="$HTTPS_URL"
              echo "HTTPS works, using $URL"
            else
              echo "HTTPS failed, falling back to HTTP"
              URL="$HTTP_URL"
            fi
          else
            URL="$RAW_URL"
          fi
          
          echo "Visiting $URL"
          # Extract domain (remove protocol and optional www)
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}' | sed 's/^www\.//')
          
          # Create a safe slug for folder names
          SLUG=$(echo "$URL" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-100)
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          # Define paths
          BASE_DIR="assets/s_data"
          FOLDER="$BASE_DIR/$DOMAIN/$SLUG/$TIMESTAMP"
          MEDIA_FOLDER="$FOLDER/media"
          
          mkdir -p "$FOLDER" "$MEDIA_FOLDER"
          
          # Download HTML
          echo "Downloading page HTML..."
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" -o "$FOLDER/page.html" "$URL"
          
          # Take screenshot
          echo "Taking screenshot..."
          SCREENSHOT_OK=false
          if node screenshot.js "$URL" "$FOLDER/screenshot.png"; then
            SCREENSHOT_OK=true
          fi
          
          # Extract links using grep -oP (Perl regex)
          # Note: grep might fail if no matches found, so we use || true
          grep -oP 'href="\K[^"]*' "$FOLDER/page.html" 2>/dev/null | sort -u > "$FOLDER/all_links.txt" || true
          grep -oP 'src="\K[^"]*' "$FOLDER/page.html" 2>/dev/null | sort -u >> "$FOLDER/all_links.txt" || true
          sort -u "$FOLDER/all_links.txt" -o "$FOLDER/all_links.txt"
          
          # Media types to download
          MEDIA_EXT="png|jpg|jpeg|gif|svg|webp|bmp|ico|mp3|wav|ogg|flac|aac|mp4|webm|avi|mov|mkv|pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|tar|gz|7z"
          
          > "$FOLDER/media_links.txt"
          > "$FOLDER/other_links.txt"
          > "$FOLDER/downloaded_media.md"
          echo "## Downloaded Media Files" > "$FOLDER/downloaded_media.md"
          echo "" >> "$FOLDER/downloaded_media.md"
          
          # Base URL for resolving relative links
          BASE_URL="${URL%%/*}"
          
          while IFS= read -r link; do
            [ -z "$link" ] && continue
            
            # Skip anchor links or empty strings
            [[ "$link" == \#* ]] && continue
            
            if [[ "$link" = /* ]]; then
              ABSOLUTE_URL="${BASE_URL}${link}"
            elif [[ "$link" =~ ^https?:// ]]; then
              ABSOLUTE_URL="$link"
            else
              ABSOLUTE_URL="${BASE_URL}/${link}"
            fi
            
            # Extract extension safely
            ext="${link##*.}"
            # If no extension found (e.g. link ends without dot), ext might be same as link
            if [ "$ext" = "$link" ]; then
              ext=""
            fi
            
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            
            if echo "$ext_lower" | grep -Eq "^($MEDIA_EXT)$"; then
              echo "Downloading: $ABSOLUTE_URL"
              FILENAME=$(basename "$link" | sed 's/[?#].*//')
              
              # Handle duplicate filenames
              if [ -f "$MEDIA_FOLDER/$FILENAME" ]; then
                FILENAME="$(date +%s)_$FILENAME"
              fi
              
              if curl -L --retry 2 --max-time 60 -o "$MEDIA_FOLDER/$FILENAME" "$ABSOLUTE_URL" 2>/dev/null; then
                FILE_SIZE=$(stat -c%s "$MEDIA_FOLDER/$FILENAME" 2>/dev/null || echo 0)
                if [ "$FILE_SIZE" -gt 0 ]; then
                  echo "$link" >> "$FOLDER/media_links.txt"
                  if [[ "$ext_lower" =~ ^(png|jpg|jpeg|gif|svg|webp)$ ]]; then
                    echo "![$FILENAME](./media/$FILENAME)" >> "$FOLDER/downloaded_media.md"
                  else
                    echo "- [$FILENAME](./media/$FILENAME) ($(( FILE_SIZE / 1024 )) KB)" >> "$FOLDER/downloaded_media.md"
                  fi
                  echo "OK: $FILENAME"
                fi
              else
                echo "Failed: $ABSOLUTE_URL"
              fi
            else
              echo "$link" >> "$FOLDER/other_links.txt"
            fi
          done < "$FOLDER/all_links.txt"
          
          # Build index.md
          MEDIA_COUNT=$(find "$MEDIA_FOLDER" -type f 2>/dev/null | wc -l)
          {
            echo "# Visited: $URL"
            echo "**Time:** $(date)"
            echo ""
            if [ "$SCREENSHOT_OK" = true ] && [ -f "$FOLDER/screenshot.png" ]; then
              echo "## Screenshot"
              echo "![Screenshot](./screenshot.png)"
              echo ""
            fi
            echo "## Raw HTML"
            echo "[page.html](./page.html)"
            echo ""
            echo "## Downloaded Media ($MEDIA_COUNT files)"
            if [ "$MEDIA_COUNT" -gt 0 ]; then
              cat "$FOLDER/downloaded_media.md"
            else
              echo "_No media files downloaded_"
            fi
            echo ""
            echo "## Other Links"
            if [ -s "$FOLDER/other_links.txt" ]; then
              head -50 "$FOLDER/other_links.txt" | while read -r link; do
                echo "- [$link]($link)"
              done
            fi
            echo ""
            echo "## Stats"
            echo "- Links: $(wc -l < "$FOLDER/all_links.txt")"
            echo "- Media: $MEDIA_COUNT"
          } > "$FOLDER/index.md"
          
          # Export variables for subsequent steps
          echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV
          echo "SLUG=$SLUG" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          
          echo "Done: $MEDIA_COUNT files downloaded"

      - name: Create zip archive of the timestamp folder
        run: |
          # Use the variables set in the previous step
          TARGET_DIR="assets/s_data/$DOMAIN/$SLUG"
          ZIP_NAME="$TIMESTAMP.zip"
          
          if [ -d "$TARGET_DIR" ]; then
            cd "$TARGET_DIR"
            # Create zip inside the folder so paths inside are relative
            zip -r "$ZIP_NAME" "$TIMESTAMP"
            echo "Created zip: $ZIP_NAME"
          else
            echo "Directory not found: $TARGET_DIR"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Check if there are any changes to commit
          if ! git diff --staged --quiet; then
            git add -A
            git commit -m "Saved page with media and screenshot [skip ci]"
            
            # Push changes
            # Using 'origin' ensures it pushes to the remote repository.
            git push origin HEAD
          else
            echo "Nothing to commit"
          fi
