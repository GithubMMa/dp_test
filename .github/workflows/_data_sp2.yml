name: 📦 Data Sync sp2
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Data sources'
        required: true
        type: string
      unique_folder_name:
        description: 'folder name'
        required: true
        type: string
      password:
        description: 'Encryption key (optional)'
        required: false
        default: ''
        type: string
      stage_number:
        description: 'Stage number'
        required: true
        type: integer
      all_stages:
        description: 'Number of total stages'
        required: true
        type: integer

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Init
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Env
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc

      - name: Process Data
        run: |
          set -e
          MODE="normal"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          echo "Mode: $MODE"
          echo "Threshold: $SPLIT_THRESHOLD_MB MB"
          echo "Branch: $BRANCH"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Encryption: ON"
          else
            echo "Encryption: OFF"
          fi

          mkdir -p assets/_data _tmp

          # Function to get folder name
          get_unique_folder() {
            local unique_folder_name="${{ github.event.inputs.unique_folder_name }}"
            echo "$unique_folder_name"
          }

          create_error_file() {
            local ORIG_FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local U_F_NAME=$(get_unique_folder)
            mkdir -p "assets/_data/$U_F_NAME"
            {
              echo "# Error Log"
              echo ""
              echo "| Key | Value |"
              echo "|-----|-------|"
              echo "| **Target** | \`${ORIG_FILENAME}\` |"
              echo "| **Source** | ${URL} |"
              echo "| **Time** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Result** | **FAILED** |"
              echo "---"
              echo "## Error"
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
            } > "assets/_data/$U_F_NAME/log.txt"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""
            
            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt for $FILENAME"
              
              # Try aria2 first
              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=90 \
                --connect-timeout=36 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="_tmp" \
                --out="$FILENAME" \
                "$URL" 2>&1) && SUCCESS=true && break
              
              echo "Fallback to curl..."
              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "_tmp/$FILENAME" \
                "$URL" 2>&1) && SUCCESS=true && break
              
              echo "Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            done

            if [ "$SUCCESS" = true ] && [ -f "_tmp/$FILENAME" ]; then
              # Check if file is not empty
              if [ -s "_tmp/$FILENAME" ]; then
                echo "OK: $FILENAME"
                return 0
              else
                rm -f "_tmp/$FILENAME"
                create_error_file "$FILENAME" "Empty file downloaded" "$URL"
                return 1
              fi
            else
              # Clean up partial files on failure
              rm -f "_tmp/$FILENAME"
              create_error_file "$FILENAME" "$ERROR_LOG" "$URL"
              return 1
            fi
          }

          # Process URLs
          for URL in $URLS; do
            # Sanitize filename
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            echo "Fetching: $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || echo "Failed: $FILENAME"
          done

          if [ "$MODE" = "normal" ]; then
            for FILE in _tmp/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              U_F_NAME=$(get_unique_folder)
              
              if [ -z "$U_F_NAME" ]; then
                U_F_NAME="default_folder"
              fi
              
              mkdir -p "assets/_data/$U_F_NAME"
              
              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "Splitting large file: $BASENAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" -P "$ZIP_PASSWORD" "assets/_data/$U_F_NAME/${U_F_NAME}.zip" -j "$FILE"
                else
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" "assets/_data/$U_F_NAME/${U_F_NAME}.zip" -j "$FILE"
                fi
                
                # Generate links for split parts
                FOLDER_ENCODED=$(echo "${U_F_NAME}" | sed 's/ /%20/g')
                DOWNLOAD_LINKS=""
                
                # Collect all parts including the main zip if it exists (though usually split creates z01, z02...)
                # We look for the pattern ${U_F_NAME}.zip*
                for part_file in "assets/_data/${U_F_NAME}/${U_F_NAME}".z* "assets/_data/${U_F_NAME}/${U_F_NAME}.zip"; do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/assets/_data/${FOLDER_ENCODED}/${PART_ENCODED}"
                    DOWNLOAD_LINKS="${DOWNLOAD_LINKS}| \`${PART_BASENAME}\` | [Get](${RAW_LINK}) |"$'\n'
                  fi
                done
                
              else
                echo "Zipping: $U_F_NAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" "assets/_data/$U_F_NAME/${U_F_NAME}.zip" "$FILE"
                else
                  zip -j "assets/_data/$U_F_NAME/${U_F_NAME}.zip" "$FILE"
                fi
                
                # Generate link for single zip
                FILE_ENCODED=$(echo "${U_F_NAME}.zip" | sed 's/ /%20/g')
                FOLDER_ENCODED=$(echo "${U_F_NAME}" | sed 's/ /%20/g')
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/assets/_data/${FOLDER_ENCODED}/${FILE_ENCODED}"
                DOWNLOAD_LINKS="| \`${U_F_NAME}.zip\` | [Get](${RAW_LINK}) |"$'\n'
              fi
            done

            # ---- Filter parts based on the selected stage ----
            STAGE="${{ github.event.inputs.stage_number }}"
            TOTAL_STAGES="${{ github.event.inputs.all_stages }}"
            echo "Filtering parts for stage $STAGE (1–$TOTAL_STAGES)"

            for ZIP_DIR in assets/_data/*; do
              [ -d "$ZIP_DIR" ] || continue
              U_F_NAME=$(basename "$ZIP_DIR")
              
              # Find all parts for this zip
              PART_FILES=$(find "$ZIP_DIR" -maxdepth 1 -type f -name "${U_F_NAME}.zip*" 2>/dev/null)
              
              # Count parts
              TOTAL_PARTS=$(echo "$PART_FILES" | wc -l)
              
              # If not split (only 1 file), keep it
              if [ "$TOTAL_PARTS" -le 1 ]; then
                continue
              fi

              # Calculate range for this stage
              PARTS_PER_STAGE=$(( (TOTAL_PARTS + TOTAL_STAGES - 1) / TOTAL_STAGES ))
              START=$(( (STAGE-1)*PARTS_PER_STAGE + 1 ))
              END=$(( STAGE*PARTS_PER_STAGE ))
              
              echo "  $U_F_NAME: total=$TOTAL_PARTS, keep=$START–$END"

              # Iterate and delete parts outside range
              for PART_FILE in $PART_FILES; do
                BASENAME=$(basename "$PART_FILE")
                
                # Determine part number
                if [[ "$BASENAME" == "${U_F_NAME}.zip" ]]; then
                  PART_NUM=1
                else
                  # Extract number from z01, z02, etc.
                  # Remove prefix up to the last dot and the extension
                  # Example: file.zip.z01 -> z01 -> 1
                  NUM_PART=$(echo "$BASENAME" | grep -oP '\.z\d+$' | tr -d '.z')
                  if [ -z "$NUM_PART" ]; then
                    # Fallback if pattern doesn't match exactly
                    continue 
                  fi
                  PART_NUM=$((10#$NUM_PART + 1))
                fi

                if (( PART_NUM < START || PART_NUM > END )); then
                  echo "    Deleting part $BASENAME (Num: $PART_NUM)"
                  rm -f "$PART_FILE"
                fi
              done
            done
            # -------------------------------------------------------
            
            rm -rf _tmp
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Index
        run: |
          FOLDERS=$(find assets/_data -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)
          if [ -z "$FOLDERS" ]; then
            echo "No data found"
            exit 0
          fi
          # You can add logic here to update README.md if needed
          # echo "$FOLDERS" > assets/_data/INDEX.txt

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "bot"
          git config user.email "bot@github.com"
          git config http.postBuffer 524288000
          git config http.version HTTP/1.1
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 999999
          
          git add README.md
          git add assets/_data/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "[Sync] Update data [skip ci]"
          
          # Pull with rebase to handle conflicts gracefully
          git pull --rebase origin "$BRANCH" || {
            echo "Failed to pull, exiting"
            exit 1
          }
          
          MAX_RETRIES=2
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempting to push (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)..."
            if git push origin HEAD:"$BRANCH" 2>&1; then
              SUCCESS=true
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Push failed. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "Failed to push after $MAX_RETRIES attempts."
            exit 1
          fi
          echo "Pushed successfully"
