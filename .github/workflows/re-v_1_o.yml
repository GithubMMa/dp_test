name: Re gng_data folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside gng_data/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove gng_data folder and recreate it
        run: |
          rm -rf gng_data
          mkdir gng_data

      - name: Commit and push empty folder
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add gng_data
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[LiveDL] Empty gng_data folder [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ gng_data folder cleared"
          fi
