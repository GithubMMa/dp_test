name: Re v_1_o folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside v_1_o/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove v_1_o folder and recreate it
        run: |
          rm -rf v_1_o
          mkdir v_1_o

      - name: Commit and push empty folder
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add v_1_o
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[LiveDL] Empty v_1_o folder [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ v_1_o folder cleared"
          fi
